world:
  width: 64
  height: 64
  default_seed: 42
  ticks_per_day: 96
  days_per_season: 30

terrain:
  water_threshold: 0.25
  grass_threshold: 0.55
  forest_threshold: 0.75
  # above forest_threshold -> mountain

resources:
  tree_density: 0.6
  berry_density: 0.4
  stone_density: 0.2
  max_trees: 10
  max_berries: 5
  max_stone: 8
  regen_rate_spring: 0.005
  regen_rate_summer: 0.003
  regen_rate_autumn: 0.002
  regen_rate_winter: 0.0

agents:
  start_hp: 100.0
  max_hp: 100.0
  start_hunger: 0.0
  max_hunger: 100.0
  start_thirst: 0.0
  max_thirst: 100.0
  start_tired: 0.0
  max_tired: 100.0

  # Per-tick decay rates
  hunger_per_tick: 0.3
  thirst_per_tick: 0.5          # thirst rises faster than hunger
  tired_per_tick: 0.2
  tired_per_move: 0.15          # extra tired per movement action
  # Time-to-danger at default rates (no recovery actions):
  #   thirst: 100 / 0.5 = 200 ticks  ≈  2.1 days
  #   hunger: 100 / 0.3 = 333 ticks  ≈  3.5 days
  #   tired:  100 / 0.2 = 500 ticks  ≈  5.2 days (no movement)
  #           100 / 0.35 = 286 ticks ≈  3.0 days (every tick has movement)

  # Damage from starvation / dehydration
  starvation_hp_loss: 2.0       # hp lost per tick when fully hungry
  dehydration_hp_loss: 3.0      # hp lost per tick when fully thirsty

  # Rest action (short-term recovery)
  rest_tired_recovery: 5.0
  rest_hp_recovery: 0.5

  # Sleep action (long-term recovery)
  sleep_tired_recovery: 20.0
  sleep_hp_recovery: 2.0
  sleep_home_tired_bonus: 10.0  # extra tired recovery when sleeping at home
  sleep_home_hp_bonus: 1.0

  # Food
  eat_hunger_reduction: 25.0    # hunger reduced per berry eaten
  eat_meat_hunger_reduction: 40.0
  drink_thirst_reduction: 40.0

  # Forage
  forage_berry_amount: 2
  forage_wood_amount: 1
  forage_stone_amount: 1

  # Food retrieval (units retrieved per retrieve_food action)
  retrieve_food_amount: 1         # bounded retrieval: one unit per action

  # Hunting success (scripted; base chance before skill)
  hunt_base_hp_cost: 2.0

animals:
  rabbits_per_world: 20
  deer_per_world: 10
  wolves_per_world: 3

  rabbit_hp: 20.0
  deer_hp: 40.0
  wolf_hp: 80.0

  flee_range: 5                 # tiles at which prey starts fleeing
  hunt_range: 10                # tiles at which wolf starts hunting
  wolf_attack_damage: 15.0
  wolf_sleep_bonus_damage: 10.0 # extra damage on sleeping agent

  # Meat yield on kill
  rabbit_meat_yield: 1
  deer_meat_yield: 3

memory:
  sight_radius: 10              # cells the agent can see (observation window = 2*r+1)
  max_entries: 20               # max entries per memory category
  decay_rate: 0.02              # confidence lost per tick

# -------------------------------------------------------------------------
# Seed pools for training / validation / story
# -------------------------------------------------------------------------
seeds:
  training_range: [0, 899999]
  validation:
    - 900001
    - 900002
    - 900003
    - 900004
    - 900005
    - 900006
    - 900007
    - 900008
    - 900009
    - 900010
  story:
    - 999001
    - 999002
    - 999003
    - 999004
    - 999005

# -------------------------------------------------------------------------
# Reward weights  (all weights are read by survival_reward in rl/rewards.py)
# -------------------------------------------------------------------------
rewards:
  alive_reward: 0.01
  hunger_penalty_scale: 0.001
  thirst_penalty_scale: 0.0015    # higher than hunger: thirst kills faster
  tired_penalty_scale: 0.0005
  store_food_bonus: 0.05          # temporary shaping signal; set to 0.0 to disable
  death_penalty: -1.0

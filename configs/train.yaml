training:
  algorithm: PPO
  num_rollout_workers: 4
  num_envs_per_worker: 2
  train_batch_size: 4000
  sgd_minibatch_size: 512
  num_sgd_iter: 10
  lr: 0.0003
  gamma: 0.99
  lambda_gae: 0.95
  clip_param: 0.2
  entropy_coeff: 0.01
  vf_loss_coeff: 0.5
  max_iterations: 1000
  checkpoint_freq: 50
  checkpoint_dir: "checkpoints/"

environment:
  max_steps_per_episode: 1000
  # observation_window is derived from world.memory.sight_radius: 2*r+1
  # Set here for explicit documentation; must match world config.
  observation_window: 21

model:
  # CNN: list of out_channels for each Conv2d layer (kernel=3, same padding)
  cnn_channels: [32, 64, 64]
  # Use global average pooling after CNN to decouple output size from window size
  use_global_avg_pool: true
  # MLP hidden layers for self-feature and memory-feature encoders
  self_mlp_hidden: [128, 64]
  memory_mlp_hidden: [64, 32]
  # Shared trunk hidden layers (input is cnn_out + self_embed + memory_embed)
  trunk_hidden: [256, 128]
  use_action_masking: true
